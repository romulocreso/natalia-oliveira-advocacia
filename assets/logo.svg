<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 135" fill="none" aria-label="Monograma NO">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9cf97"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#9c7b34"/>
    </linearGradient>
  </defs>

  <!-- O (círculo fino, sobreposto à direita do N) -->
  <circle cx="60" cy="62.5" r="21" stroke="url(#gold)" stroke-width="2.6" fill="none"/>

  <g stroke="url(#gold)" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- N: perna esquerda + serifas -->
    <path d="M29 36 V76"/>
    <path d="M24 36 H34"/>
    <path d="M24 76 H34"/>
    <!-- N: diagonal -->
    <path d="M29 36 L54 76"/>
    <!-- N: perna direita + serifas -->
    <path d="M54 36 V76"/>
    <path d="M49 36 H59"/>
    <path d="M49 76 H59"/>
  </g>

  <!-- Haste longa descendente -->
  <path d="M48 27 L37 104" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Estrela de 4 pontas -->
  <g stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round" fill="none">
    <path d="M37 99 V113"/>
    <path d="M30 106 H44"/>
    <path d="M33 102 L41 110"/>
    <path d="M41 102 L33 110"/>
  </g>
</svg>
